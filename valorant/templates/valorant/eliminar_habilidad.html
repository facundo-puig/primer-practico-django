{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eliminar Habilidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'valorant/styles.css' %}">
</head>
<body class="min-h-screen bg-[#0f1923] text-white flex flex-col items-center justify-center">

    <div class="text-center max-w-md px-6">
        <p class="text-[#ff4655] text-xs font-semibold tracking-[0.3em] uppercase mb-2">Riot Games</p>
        <h1 class="text-5xl tracking-wider mb-3">ELIMINAR</h1>
        <div class="divider w-48 mx-auto mb-6"></div>

        <p class="text-gray-300 mb-2">¿Estás seguro que querés eliminar</p>
        <p class="text-[#ff7b85] text-2xl font-bold tracking-wider mb-6">"{{ habilidad.nombre }}"?</p>

        <div class="flex gap-4 justify-center">
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="px-6 py-2 bg-[#ff4655] text-white text-sm font-bold tracking-widest uppercase rounded hover:bg-[#e03040] transition-colors">
                    Sí, eliminar
                </button>
            </form>
            <a href="{% url 'habilidades' %}" class="px-6 py-2 border border-white/20 text-gray-400 text-sm font-bold tracking-widest uppercase rounded hover:border-white hover:text-white transition-colors">
                Cancelar
            </a>
        </div>
    </div>

</body>
</html>
